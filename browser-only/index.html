<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>매입자료 비교 · 로컬 처리</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">LOCAL-ONLY EXCEL CHECKER</p>
      <h1>매입자료 비교</h1>
      <p class="intro">파일은 이 브라우저 안에서만 비교됩니다. 업로드한 엑셀 파일은 서버로 전송하거나 저장하지 않습니다.</p>
      <form id="compare-form">
        <label class="upload"><span>A · 매입매출장</span><input name="aFile" type="file" accept=".xls,.xlsx" required /><small>매입매출장 파일을 선택하세요.</small></label>
        <label class="upload"><span>B · 전자세금계산서</span><input name="bFile" type="file" accept=".xls,.xlsx" required /><small>B의 셀 위치·값·시트는 유지되고 색만 표시됩니다.</small></label>
        <button type="submit">내 컴퓨터에서 비교하기</button>
      </form>
      <p id="status" role="status"></p>
      <section class="legend"><span><i class="yellow"></i>노랑: A에 대응 값 또는 행 없음</span><span><i class="red"></i>빨강: A와 B 값이 다름</span></section>
      <p class="privacy">외부로 전송되는 것은 이 페이지를 열 때 필요한 프로그램 코드뿐이며, 선택한 엑셀 파일은 브라우저 밖으로 나가지 않습니다.</p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/cpexcel.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

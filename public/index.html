<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>매입자료 비교</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">EXCEL CHECKER</p>
      <h1>매입자료 비교</h1>
      <p class="intro">A 매입매출장과 B 전자세금계산서 파일을 비교해, B 파일의 해당 셀만 색으로 표시합니다.</p>
      <form id="compare-form">
        <label class="upload"><span>A · 매입매출장</span><input name="aFile" type="file" accept=".xls,.xlsx" required /><small>사업자번호·일자·공급가액·부가세를 기준으로 비교합니다.</small></label>
        <label class="upload"><span>B · 전자세금계산서</span><input name="bFile" type="file" accept=".xls,.xlsx" required /><small>B의 행·열·값·시트는 유지되며 색만 바뀝니다.</small></label>
        <button type="submit">비교하고 결과 내려받기</button>
      </form>
      <p id="status" role="status"></p>
      <section class="legend"><span><i class="yellow"></i>노랑: A에 대응 값 또는 행 없음</span><span><i class="red"></i>빨강: A와 B 값이 다름</span></section>
      <p class="privacy">업로드된 파일은 비교 결과를 만든 뒤 저장하지 않습니다.</p>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
